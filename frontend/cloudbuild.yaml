steps:
- name: 'node:20'
  entrypoint: npm
  args: ['install']

- name: 'node:20'
  entrypoint: npm
  args: ['run', 'build']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: bash
  args:
  - -c
  - |
      gsutil -m rsync -r dist gs://smart-retail-app-data

options:
  logging: CLOUD_LOGGING_ONLY